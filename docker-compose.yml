version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: note_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: notedb

  backend:
    build: ./backend
    container_name: note_backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/notedb
      JWT_SECRET: your_jwt_secret_here
      # Thêm các biến Cloudinary nếu dùng:
      # CLOUDINARY_CLOUD_NAME: ...
      # CLOUDINARY_API_KEY: ...
      # CLOUDINARY_API_SECRET: ...

  frontend:
    build: ./frontend
    container_name: note_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data: