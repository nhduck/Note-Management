server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/ calls → backend container
    location /api/ {
        proxy_pass http://note_backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /socket.io/ {
    proxy_pass http://note_backend:5000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;   # ← bắt buộc cho WebSocket
    proxy_set_header Connection "upgrade";    # ← bắt buộc cho WebSocket
    proxy_read_timeout 86400;                 # ← giữ connection lâu
}
}